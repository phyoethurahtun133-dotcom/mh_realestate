<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangon Real Estate Spatial Map</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.0/dist/leaflet-geoman.css" />
    <!-- Leaflet Geocoder -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <link rel="stylesheet" href="css/styles.css" />

        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#047857">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="MH Spatial">

    <link rel="icon" type="image/svg+xml" href="icons/app-icon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

</head>
<body class="bg-gray-100 h-screen overflow-hidden text-gray-800 flex">

    <aside id="mainSidebar" class="w-full md:w-[380px] bg-white shadow-xl z-[400] flex flex-col h-screen shrink-0 transition-all duration-300 relative border-r border-gray-200">
        
        <button id="sidebarToggleBtn" class="absolute top-1/2 -right-8 transform -translate-y-1/2 bg-white border border-gray-200 border-l-0 shadow-[4px_0_6px_rgba(0,0,0,0.1)] rounded-r-md py-4 px-2 text-gray-500 hover:text-emerald-600 focus:outline-none transition-colors">
            <i id="sidebarToggleIcon" class="fas fa-chevron-left"></i>
        </button>

        <div class="p-5 border-b border-gray-200 bg-emerald-700 text-white flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Melody House Real Estate</h1>
                <p class="text-xs text-emerald-200 mt-1"><i class="fas fa-map-marked-alt mr-1"></i> Custom GIS Plotter</p>
            </div>
        </div>

        <div class="border-b border-gray-200 bg-gray-50 shrink-0 overflow-y-auto max-h-[85vh] custom-scrollbar">
            <button id="toggleFiltersBtn" class="w-full p-5 flex justify-between items-center text-left focus:outline-none select-none hover:bg-gray-100 transition-colors">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Filters & Tools</h2>
                <i id="filterToggleIcon" class="fas fa-chevron-up text-gray-400 transition-transform duration-200"></i>
            </button>
            
            <div id="filterContent" class="p-5 pt-0 space-y-4">
                <div>
                    <input type="text" id="searchInput" placeholder="Search Land ID, Township..." class="w-full text-sm border-gray-300 rounded-md shadow-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <div>
                    <select id="statusFilter" class="w-full text-sm border-gray-300 rounded-md shadow-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500">
                        <option value="all">All Properties</option>
                        <option value="Available">Available</option>
                        <option value="Archived">Archived</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Filter Township</label>
                    <select id="townshipFilter" class="w-full text-sm border-gray-300 rounded-md shadow-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500">
                        <option value="all">All Townships</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Filter Quarter / Ward</label>
                    <select id="quarterFilter" class="w-full text-sm border-gray-300 rounded-md shadow-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500">
                        <option value="all">All Quarters</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button id="exportBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 px-4 rounded transition-colors shadow-sm">
                        <i class="fas fa-download mr-1"></i> Export
                    </button>
                    
                    <label class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded cursor-pointer text-center transition-colors shadow-sm">
                        <i class="fas fa-upload mr-1"></i> Load
                        <input type="file" id="importFile" accept=".geojson,.json" class="hidden">
                    </label>
                </div>

                <div class="mt-4 pt-4 border-t border-gray-200">
                    <button id="toggleHeatmapBtn" class="w-full bg-orange-100 hover:bg-orange-200 text-orange-700 border border-orange-300 text-xs font-bold py-2 px-4 rounded transition-colors shadow-sm flex items-center justify-center gap-2">
                        <i class="fas fa-fire"></i> Toggle Price Heatmap
                    </button>
                </div>

                <div class="mt-4 pt-4 border-t border-gray-200">
                    <label class="block text-xs font-bold text-gray-700 mb-2">Highlight by Price (Lakhs)</label>
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="minPrice" placeholder="Min" class="w-1/2 p-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-indigo-500">
                        <input type="number" id="maxPrice" placeholder="Max" class="w-1/2 p-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <button id="highlightPriceBtn" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 border border-indigo-300 text-xs font-bold py-2 px-4 rounded transition-colors shadow-sm flex items-center justify-center gap-2">
                        <i class="fas fa-search-dollar"></i> Highlight Plots
                    </button>
                    <button id="clearHighlightBtn" class="w-full mt-2 bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 text-xs font-bold py-1.5 px-4 rounded transition-colors shadow-sm hidden">
                        Clear Highlights
                    </button>
                </div>

                <div class="border-t border-gray-200 pt-4 mt-4">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2"><i class="fas fa-layer-group mr-1"></i> Blueprint Overlays</h3>
                    <div class="space-y-3">
                        <label class="w-full flex items-center justify-center bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold py-2 px-4 rounded cursor-pointer text-center transition-colors shadow-sm">
                            <i class="fas fa-image mr-2"></i> Load Overlay Image
                            <input type="file" id="overlayImageInput" accept="image/*" class="hidden">
                        </label>
                        
                        <div id="opacityControlBlock" class="hidden bg-white p-3 rounded-md border border-gray-200 shadow-inner">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-medium text-gray-600">Overlay Opacity</span>
                                <span id="opacityVal" class="text-xs font-bold text-purple-600">75%</span>
                            </div>
                            <input type="range" id="overlayOpacitySlider" min="0" max="100" value="75" class="w-full accent-purple-600 cursor-pointer">
                            <p class="text-[10px] text-gray-400 mt-1 italic"><i class="fas fa-info-circle mr-1"></i> Drag internal purple dots to mesh onto roads.</p>
                        </div>

                        <div id="globalControls" class="p-3 bg-white border border-gray-200 rounded-md space-y-3 hidden shadow-inner">
                            <h4 class="text-[11px] font-bold text-gray-700 uppercase tracking-wider text-center border-b pb-1">Global Image Controls</h4>
                            
                            <div class="flex items-center justify-between gap-1">
                                <span class="text-xs font-medium text-gray-600 w-12">Rotate:</span>
                                <button id="btnRotateLeft" type="button" class="flex-1 py-1.5 bg-gray-50 border border-gray-300 rounded shadow-sm text-xs font-semibold hover:bg-purple-50 hover:border-purple-300 transition-colors">↺ -5°</button>
                                <button id="btnRotateRight" type="button" class="flex-1 py-1.5 bg-gray-50 border border-gray-300 rounded shadow-sm text-xs font-semibold hover:bg-purple-50 hover:border-purple-300 transition-colors">↻ +5°</button>
                            </div>

                            <div class="flex items-center justify-between gap-1">
                                <span class="text-xs font-medium text-gray-600 w-12">Size:</span>
                                <button id="btnScaleDown" type="button" class="flex-1 py-1.5 bg-gray-50 border border-gray-300 rounded shadow-sm text-xs font-semibold hover:bg-purple-50 hover:border-purple-300 transition-colors">🔍 -5%</button>
                                <button id="btnScaleUp" type="button" class="flex-1 py-1.5 bg-gray-50 border border-gray-300 rounded shadow-sm text-xs font-semibold hover:bg-purple-50 hover:border-purple-300 transition-colors">🔍 +5%</button>
                            </div>

                            <div class="pt-1">
                                <span class="block text-center text-[10px] font-medium text-gray-400 mb-1">Nudge Position on Map</span>
                                <div class="grid grid-cols-3 gap-1 w-28 mx-auto text-center">
                                    <div></div>
                                    <button id="btnMoveNorth" type="button" class="bg-gray-50 border border-gray-300 rounded shadow-sm text-xs p-1.5 font-bold hover:bg-purple-50 hover:border-purple-300 transition-colors">▲</button>
                                    <div></div>
                                    <button id="btnMoveWest" type="button" class="bg-gray-50 border border-gray-300 rounded shadow-sm text-xs p-1.5 font-bold hover:bg-purple-50 hover:border-purple-300 transition-colors">◀</button>
                                    <button id="btnMoveSouth" type="button" class="bg-gray-50 border border-gray-300 rounded shadow-sm text-xs p-1.5 font-bold hover:bg-purple-50 hover:border-purple-300 transition-colors">▼</button>
                                    <button id="btnMoveEast" type="button" class="bg-gray-50 border border-gray-300 rounded shadow-sm text-xs p-1.5 font-bold hover:bg-purple-50 hover:border-purple-300 transition-colors">▶</button>
                                </div>
                            </div>

                            <div class="pt-2 border-t border-gray-100">
                                <div class="pt-2 border-t border-gray-100">
                                    <button id="btnLockOverlay" type="button" class="w-full mb-2 py-1.5 bg-emerald-50 hover:bg-emerald-600 text-emerald-600 hover:text-white border border-emerald-200 hover:border-emerald-600 rounded text-xs font-bold transition-colors flex items-center justify-center gap-1 shadow-sm">
                                        <i class="fas fa-lock"></i> Lock & Finalize Image
                                    </button>
                                    <button id="btnRemoveOverlay" type="button" class="w-full py-1.5 bg-red-50 hover:bg-red-600 text-red-600 hover:text-white border border-red-200 hover:border-red-600 rounded text-xs font-bold transition-colors flex items-center justify-center gap-1 shadow-sm">
                                        <i class="fas fa-trash-alt"></i> Remove Active Image
                                    </button>
                                </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div class="flex-grow overflow-y-auto p-3 bg-gray-100 custom-scrollbar" id="propertyList">
            <div class="text-center p-5 text-gray-400 text-sm mt-10">
                <i class="fas fa-draw-polygon text-3xl mb-3 text-gray-300 block"></i>
                Draw a plot on the map to begin.
            </div>
        </div>
    </aside>

    <main class="flex-grow h-screen relative z-0">
        <div id="map" class="w-full h-full"></div>
    </main>

    <div id="metaModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center z-[1000]">
        <div class="bg-white rounded-lg shadow-xl w-96 max-h-[90vh] overflow-y-auto overflow-x-hidden p-6 relative">
            <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Plot Metadata</h3>
            <form id="metaForm" class="space-y-3">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700">Land ID</label>
                        <input type="text" id="landIdInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">Price (Lakhs)</label>
                        <input type="number" id="priceInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm p-2 border" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-700">Status & Color</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <select id="statusInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm p-2 border">
                                <option value="Available">Available</option>
                                <option value="Archived">Archived</option>
                            </select>
                        </div>
                        <div>
                            <input type="color" id="colorInput" value="#10b981" class="mt-1 block w-full h-[38px] rounded-md border border-gray-300 shadow-sm cursor-pointer p-1">
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-200 my-4 pt-4">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-3">Location Details</h4>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700">Division</label>
                            <input type="text" id="divisionInput" value="Yangon" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm p-2 border">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700">Township</label>
                            <input type="text" id="townshipInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm p-2 border" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700">Quarter</label>
                            <input type="text" id="quarterInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm p-2 border">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700">Plot Number</label>
                            <input type="text" id="numberInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm p-2 border">
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-200 my-4 pt-4">
                    <label class="block text-xs font-medium text-gray-700 mb-2">Attach Plot Photo / Deed</label>
                    <input type="file" id="plotImageInput" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
                    <!-- Hidden input to store base64 string -->
                    <input type="hidden" id="plotImageBase64">
                </div>

                <div>
                    <button type="button" id="addRemarkBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold py-2 px-4 rounded transition-colors mb-2">
                        + Add Remark
                    </button>
                    <textarea id="remarkInput" rows="2" class="hidden w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm p-2 border" placeholder="Enter custom notes..."></textarea>
                </div>

                <div class="flex justify-between pt-4 border-t border-gray-200 mt-4">
                    <button type="button" id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 text-sm font-bold py-2 px-4 rounded transition-colors">Discard</button>
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2 px-4 rounded transition-colors">Save Plot</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 1. Core Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- 2. Geoman -->
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.0/dist/leaflet-geoman.min.js"></script>

    <!-- 3. Leaflet Geocoder -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- 4. Leaflet Browser Print (NEW) -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.browser.print@2.0.2/dist/leaflet.browser.print.min.js"></script>

    <script src="https://unpkg.com/leaflet-simple-map-screenshoter"></script>

    <!-- 5. App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
